<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Championnat Football Faculté</title>
  <meta name="description" content="Tableau des matchs — Championnat Football Faculté, Saison 2025/2026" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────
         DESIGN TOKENS
      ───────────────────────────────────────────── */
    :root {
      --bg: hsl(140, 20%, 97%);
      --fg: hsl(220, 20%, 14%);
      --card: hsl(0, 0%, 100%);
      --card-fg: hsl(220, 20%, 14%);
      --primary: hsl(153, 60%, 33%);
      --primary-fg: hsl(0, 0%, 100%);
      --secondary: hsl(140, 15%, 93%);
      --secondary-fg: hsl(220, 20%, 14%);
      --muted-fg: hsl(220, 10%, 50%);
      --border: hsl(140, 12%, 89%);
      --accent: hsl(45, 93%, 55%);
      --winner: hsl(153, 60%, 33%);
      --loser: hsl(220, 10%, 65%);
      --radius: 0.75rem;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, .10), 0 2px 4px rgba(0, 0, 0, .06);
    }

    /* ─────────────────────────────────────────────
         RESET & BASE
      ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────────
         HEADER
      ───────────────────────────────────────────── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
    }

    .trophy-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .trophy-icon svg {
      width: 1.2rem;
      height: 1.2rem;
      color: #fff;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -0.025em;
      color: var(--card-fg);
    }

    header p.season {
      font-size: 0.75rem;
      color: var(--muted-fg);
      margin-top: 0.1rem;
    }

    /* ─────────────────────────────────────────────
         ROUND NAVIGATION
      ───────────────────────────────────────────── */
    nav {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0.75rem 1.25rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-inner::-webkit-scrollbar {
      display: none;
    }

    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      width: max-content;
    }

    .tab-btn {
      white-space: nowrap;
      border: none;
      cursor: pointer;
      border-radius: calc(var(--radius) - 0.125rem);
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      background: var(--secondary);
      color: var(--secondary-fg);
    }

    .tab-btn:hover {
      background: hsl(153 60% 33% / 0.12);
    }

    .tab-btn.active {
      background: var(--primary);
      color: var(--primary-fg);
      box-shadow: var(--shadow-sm);
    }

    /* ─────────────────────────────────────────────
         MAIN CONTENT
      ───────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    .round-header {
      margin-bottom: 1.5rem;
    }

    .round-header h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--fg);
    }

    .round-header p {
      font-size: 0.8rem;
      color: var(--muted-fg);
      margin-top: 0.2rem;
    }

    /* ─────────────────────────────────────────────
         MATCHES GRID
      ───────────────────────────────────────────── */
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ─────────────────────────────────────────────
         MATCH CARD
      ───────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    /* Status row */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 9999px;
      padding: 0.2rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .badge.played {
      background: hsl(153 60% 33% / 0.12);
      color: var(--primary);
    }

    .badge.upcoming {
      background: hsl(45 93% 55% / 0.2);
      color: hsl(35, 80%, 30%);
    }

    .match-id {
      font-size: 0.7rem;
      color: var(--muted-fg);
    }

    /* Teams & score */
    .teams-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .team {
      flex: 1;
      text-align: center;
    }

    .team-name {
      font-size: 0.95rem;
      font-weight: 700;
      transition: color 0.15s;
    }

    .team-name.winner {
      color: var(--winner);
    }

    .team-name.loser {
      color: var(--loser);
      text-decoration: line-through;
    }

    .team-name.draw {
      color: var(--card-fg);
    }

    .team-name.neutral {
      color: var(--card-fg);
    }

    /* VS bubble */
    .vs-bubble {
      flex-shrink: 0;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 900;
    }

    /* Score box */
    .score-box {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      background: var(--secondary);
      border-radius: calc(var(--radius) - 0.25rem);
      padding: 0.375rem 0.75rem;
    }

    .score-num {
      font-size: 1.125rem;
      font-weight: 900;
    }

    .score-num.winner {
      color: var(--winner);
    }

    .score-num.loser {
      color: var(--loser);
    }

    .score-num.draw {
      color: var(--card-fg);
    }

    .score-sep {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted-fg);
    }

    /* Meta row */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
      font-size: 0.72rem;
      color: var(--muted-fg);
    }

    .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .meta-item svg {
      width: 0.875rem;
      height: 0.875rem;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────────
         EMPTY STATE
      ───────────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 0;
      color: var(--muted-fg);
      gap: 0.75rem;
    }

    .empty svg {
      opacity: 0.3;
      width: 2.5rem;
      height: 2.5rem;
    }

    .empty p {
      font-size: 0.875rem;
    }

    /* ─────────────────────────────────────────────
         FOOTER
      ───────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted-fg);
    }
  </style>
</head>

  <!-- ══════════════════════════════════════════════════════
         JAVASCRIPT — Rendering logic (no need to touch this)
    ══════════════════════════════════════════════════════ -->
  <script>
    // Load tournament data from the JSON block
    const tournamentData = JSON.parse(
      document.getElementById('tournament-data').textContent
    );

    const rounds = Object.keys(tournamentData);
    let activeRound = rounds[0];

    // ── SVG Icons ──────────────────────────────────────────
    const icons = {
      calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`,
      clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      mapPin: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
      trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
    };

    // ── Build a single match card ───────────────────────────
    function buildCard(match) {
      const played = match.status === 'played';
      const scoreA = match.scoreA ?? 0;
      const scoreB = match.scoreB ?? 0;
      const winnerA = played && scoreA > scoreB;
      const winnerB = played && scoreB > scoreA;
      const isDraw = played && scoreA === scoreB;

      function teamClass(isA) {
        if (!played) return 'neutral';
        const wins = isA ? winnerA : winnerB;
        if (isDraw) return 'draw';
        return wins ? 'winner' : 'loser';
      }

      function scoreClass(isA) {
        if (isDraw) return 'draw';
        return (isA ? winnerA : winnerB) ? 'winner' : 'loser';
      }

      // Middle section: VS bubble or score box
      const middle = played
        ? `<div class="score-box">
               <span class="score-num ${scoreClass(true)}">${scoreA}</span>
               <span class="score-sep">-</span>
               <span class="score-num ${scoreClass(false)}">${scoreB}</span>
             </div>`
        : `<div class="vs-bubble">VS</div>`;

      return `
          <div class="card">
            <div class="card-top">
              <span class="badge ${match.status}">${played ? 'Terminé' : 'À venir'}</span>
              <span class="match-id">#${match.id}</span>
            </div>

            <div class="teams-row">
              <div class="team">
                <p class="team-name ${teamClass(true)}">${match.teamA}</p>
              </div>
              ${middle}
              <div class="team">
                <p class="team-name ${teamClass(false)}">${match.teamB}</p>
              </div>
            </div>

            <div class="meta-row">
              <span class="meta-item">${icons.calendar} ${match.date}</span>
              <span class="meta-item">${icons.clock} ${match.time}</span>
              <span class="meta-item">${icons.mapPin} ${match.stade}</span>
            </div>
          </div>`;
    }

    // ── Render the active round ─────────────────────────────
    function render() {
      const matches = tournamentData[activeRound] || [];
      const grid = document.getElementById('matches-grid');
      const title = document.getElementById('round-title');
      const count = document.getElementById('round-count');

      title.textContent = activeRound;
      count.textContent = `${matches.length} match${matches.length !== 1 ? 's' : ''}`;

      if (matches.length === 0) {
        grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1">
              ${icons.trophy}
              <p>Aucun match pour ce tour</p>
            </div>`;
      } else {
        grid.innerHTML = matches.map(buildCard).join('');
      }

      // Update active tab style
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.round === activeRound);
      });
    }

    // ── Build nav tabs ──────────────────────────────────────
    function buildNav() {
      const nav = document.getElementById('nav-tabs');
      nav.innerHTML = rounds.map(round => `
          <button class="tab-btn${round === activeRound ? ' active' : ''}"
                  data-round="${round}">
            ${round}
          </button>`).join('');

      nav.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        activeRound = btn.dataset.round;
        render();
      });
    }

    // ── Init ────────────────────────────────────────────────
    buildNav();
    render();
  </script>
</body>
